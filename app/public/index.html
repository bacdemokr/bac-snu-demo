<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SNU | BaC Demo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #0b0e18; overflow: hidden;
    font-family: -apple-system, "Segoe UI", "Apple SD Gothic Neo", sans-serif; color: #eee; }
  #wrap { position: relative; width: 100vw; height: 100vh; }
  canvas { display: block; width: 100%; height: 100%; image-rendering: pixelated; cursor: pointer; }

  /* Top bar */
  #topbar { position: absolute; top: 0; left: 0; right: 0; height: 74px;
    display: flex; align-items: center; gap: 14px; padding: 0 18px;
    background: linear-gradient(180deg, rgba(10,14,30,.85), rgba(10,14,30,0));
    pointer-events: none; z-index: 5; }
  #topbar img.snu { width: 60px; height: 60px; object-fit: contain; }
  #topbar img.nv { height: 45px; }
  #topbar .heart { color: #ff3b5c; font-size: 36px; margin: 0 6px; text-shadow: 0 0 8px rgba(255,59,92,.5); }
  #topbar h1 { font-size: 17px; font-weight: 700; letter-spacing: .3px; }
  #topbar h1 span { color: #f5a623; }
  #topbar .sub { font-size: 12px; color: #9aa3b2; margin-left: 2px; }

  /* Hint */
  #hint { position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
    font-size: 13px; color: #aeb6c4; background: rgba(10,14,30,.6);
    padding: 6px 14px; border-radius: 20px; z-index: 5; pointer-events: none;
    transition: opacity .4s; }

  /* Chat panel */
  #chat { position: absolute; top: 0; right: -440px; width: 440px; height: 100%;
    background: rgba(14,18,34,.97); border-left: 1px solid #2a3350;
    display: flex; flex-direction: column; transition: right .35s cubic-bezier(.2,.8,.2,1);
    z-index: 10; box-shadow: -8px 0 30px rgba(0,0,0,.4); }
  #chat.open { right: 0; }
  #chat-head { padding: 16px; display: flex; align-items: center; gap: 12px;
    border-bottom: 1px solid #2a3350; }
  #chat-dot { width: 38px; height: 38px; border-radius: 10px; flex: none;
    box-shadow: inset -3px -3px 0 rgba(0,0,0,.25); }
  #chat-name { font-size: 21px; font-weight: 700; }
  #chat-role { font-size: 15px; color: #9aa3b2; margin-top: 2px; }
  #chat-close { margin-left: auto; background: none; border: none; color: #9aa3b2;
    font-size: 22px; cursor: pointer; line-height: 1; }
  #chat-close:hover { color: #fff; }

  #msgs { flex: 1; overflow-y: auto; padding: 16px; display: flex;
    flex-direction: column; gap: 10px; }
  .msg { max-width: 85%; padding: 11px 15px; border-radius: 14px; font-size: 18px;
    line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
  .msg.bot { background: #242c46; align-self: flex-start; border-bottom-left-radius: 4px; }
  .msg.me { background: #3a5bd0; align-self: flex-end; border-bottom-right-radius: 4px; }
  .msg.bot.headline { background: #2e3a5c; font-weight: 700; color: #cfe0ff;
    border-left: 3px solid #5a82e0; }
  .msg.typing { color: #9aa3b2; font-style: italic; }
  .ma-chips { display: flex; flex-direction: column; gap: 7px; align-self: flex-start;
    max-width: 90%; margin-top: 2px; }
  .ma-chip { text-align: left; background: #242c46; color: #e8ecf5;
    border: 1px solid #3a466e; border-radius: 12px;
    padding: 11px 15px; font-size: 18px; cursor: pointer; transition: .15s; }
  .ma-chip:hover { background: #2e3a5c; border-color: #f5a623; }
  .ma-chip:disabled { opacity: .45; cursor: default; }
  .shot { max-width: 100%; border-radius: 12px; margin-top: 2px; display: block;
    border: 1px solid #2a3350; cursor: zoom-in; }

  #inbar { display: flex; gap: 8px; padding: 12px; border-top: 1px solid #2a3350; }
  #input { flex: 1; background: #1a2138; border: 1px solid #2a3350; border-radius: 10px;
    color: #eee; padding: 12px 14px; font-size: 18px; outline: none; }
  #input:focus { border-color: #3a5bd0; }
  #send { background: #3a5bd0; border: none; color: #fff; border-radius: 10px;
    padding: 0 18px; font-size: 18px; cursor: pointer; font-weight: 600; }
  #send:disabled { opacity: .5; cursor: default; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game"></canvas>

  <div id="topbar">
    <img class="snu" src="snu-logo.png" alt="SNU" />
    <span class="heart">♥</span>
    <img class="nv" src="nvidia-logo.svg" alt="NVIDIA" />
  </div>

  <div id="hint">🖱️ Click an agent to begin</div>

  <div id="chat">
    <div id="chat-head">
      <div id="chat-dot"></div>
      <div>
        <div id="chat-name">—</div>
        <div id="chat-role">—</div>
      </div>
      <button id="chat-close">×</button>
    </div>
    <div id="msgs"></div>
    <div id="inbar">
      <input id="input" placeholder="Type a message…" autocomplete="off" />
      <button id="send">Send</button>
    </div>
  </div>
</div>

<script src="game.js"></script>
</body>
</html>
